name: Update FireHOL to mihomo Rule-Sets

on:
  schedule:
    - cron: '0 4 * * *'      # 每天北京时间中午 12:00 左右运行
  workflow_dispatch:         # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # 强制使用 Node.js 24，消除当前警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # 保持 v4（GitHub 正在逐步更新它）

      - name: Set up Python
        uses: actions/setup-python@v5   # 保持 v5（最新稳定版）
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyYAML

      - name: Convert FireHOL lists
        run: python convert.py

      - name: Commit and push changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "没有变化，跳过提交"
          else
            git add *.yaml
            git commit -m "Update FireHOL rule-sets $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "已提交并推送更新"
          fi
