name: Update FireHOL to mihomo Rule-Sets

on:
  schedule:
    - cron: '0 4 * * *'      # 每天北京时间中午 12:00 左右
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyYAML

      - name: Convert FireHOL lists
        run: python convert_1.py

      - name: Commit and push changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查是否有任何新文件或修改（包括全新创建的文件）
          if git diff --quiet --exit-code HEAD -- *.yaml; then
            if git ls-files --others --exclude-standard | grep -q '\.yaml$'; then
              echo "检测到新创建的 YAML 文件，正在提交..."
              git add *.yaml
              git commit -m "Update FireHOL rule-sets (new files) $(date +'%Y-%m-%d %H:%M:%S')"
              git push
              echo "新文件已提交并推送"
            else
              echo "没有变化，跳过提交"
            fi
          else
            echo "检测到文件变化，正在提交..."
            git add *.yaml
            git commit -m "Update FireHOL rule-sets $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "变化已提交并推送"
          fi
