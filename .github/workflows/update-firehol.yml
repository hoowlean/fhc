name: Update FireHOL to mihomo Rule-Sets

on:
  schedule:
    - cron: '0 4 * * *'      # 每天 UTC 时间 4:00 运行（北京时间中午 12:00）
  workflow_dispatch:         # 允许你手动点击运行测试

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # 必须加这个，才能让 Actions 有权限提交文件

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyYAML

      - name: Convert FireHOL lists
        run: python convert.py

      - name: Commit and push changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "没有变化，跳过提交"
          else
            git add *.yaml
            git commit -m "Update FireHOL rule-sets $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "已提交并推送更新"
          fi
