name: Update FireHOL to mihomo Rule-Sets

on:
  schedule:
    - cron: '0 4 * * *'      # UTC 4:00 ≈ 北京时间 12:00
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 关键修复：拉取完整历史，避免 git diff 判断错误

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyYAML

      - name: Convert FireHOL lists
        run: python convert_1.py

      - name: Commit and push changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "=== 当前工作区状态 ==="
          git status --porcelain *.yaml
          
          echo "=== 检查是否有差异（包括新文件）==="
          if git diff --quiet --exit-code HEAD -- *.yaml; then
            if git ls-files --others --exclude-standard | grep -q '\.yaml$'; then
              echo "检测到新创建的 YAML 文件，正在提交..."
              git add *.yaml
              git commit -m "Update FireHOL rule-sets (new files) $(date +'%Y-%m-%d %H:%M:%S UTC')"
              git push
              echo "✅ 新文件已成功提交并推送！"
            else
              echo "文件内容没有实际变化，跳过提交"
            fi
          else
            echo "检测到文件内容变化，正在提交..."
            git add *.yaml
            git commit -m "Update FireHOL rule-sets $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "✅ 文件已成功更新并推送！"
          fi
