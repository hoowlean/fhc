name: Update FireHOL to mihomo Rule-Sets

on:
  schedule:
    - cron: '0 4 * * *'      # UTC 4:00 ≈ 北京时间 12:00 qt
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyYAML

      - name: Convert FireHOL lists
        run: python convert_1.py

      - name: Commit and push (force update timestamp)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "=== 转换完成，准备提交 ==="
          git status --porcelain *.yaml
          
          git add *.yaml
          
          # 强制提交，即使内容完全相同，也更新 commit 时间
          git commit --allow-empty -m "Update FireHOL rule-sets $(date +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          
          git push
          echo "✅ 已强制推送！仓库文件时间已更新"
