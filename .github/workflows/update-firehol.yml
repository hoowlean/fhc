name: Update FireHOL to mihomo Rule-Sets

on:
  schedule:
    - cron: '0 4 * * *'      # 北京时间约 12:00
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyYAML

      - name: Convert FireHOL lists
        run: python convert_1.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add *.yaml
          
          if git diff --cached --quiet; then
            echo "文件内容没有变化，跳过提交"
          else
            git commit -m "Update FireHOL rule-sets $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "✅ 文件已成功更新并推送！"
          fi
